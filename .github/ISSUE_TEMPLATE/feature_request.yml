name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Strong feature requests describe the workflow, not just the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what blocks you today?
      placeholder: |
        I want to …
        Today I have to …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like OpenPencil to support.
      placeholder: |
        Add support for …
        It should work by …
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but helpful. How do you work around this today? Are there simpler alternatives?

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      multiple: true
      options:
        - App UI
        - Canvas rendering
        - .fig import/export
        - SVG/PDF/raster export
        - CLI
        - MCP / automation
        - Tauri desktop
        - Collaboration
        - Documentation
        - Not sure
    validations:
      required: true

  - type: textarea
    id: figma-reference
    attributes:
      label: Figma or design-tool reference
      description: If this exists in Figma or another tool, describe how it works there. Screenshots and links help.

  - type: textarea
    id: examples
    attributes:
      label: Examples or mockups
      description: Attach screenshots, sketches, files, or links that make the request concrete.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I described the user problem, not only an implementation detail.
          required: true
